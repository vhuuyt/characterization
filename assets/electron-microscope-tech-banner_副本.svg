<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="800" viewBox="0 0 2000 800" role="img" aria-labelledby="title desc">
  <title id="title">Electron microscope technology banner</title>
  <desc id="desc">Wide dark blue high technology banner featuring an electron microscope workstation and digital measurement motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#030d26"/><stop offset=".5" stop-color="#071d43"/><stop offset="1" stop-color="#030918"/>
    </linearGradient>
    <radialGradient id="aura" cx="32%" cy="52%" r="55%"><stop stop-color="#087fa1" stop-opacity=".35"/><stop offset="1" stop-color="#04234c" stop-opacity="0"/></radialGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f9ffff"/><stop offset=".35" stop-color="#9eb8c8"/><stop offset=".62" stop-color="#f4ffff"/><stop offset="1" stop-color="#61798f"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#9af8ff" stop-opacity=".9"/><stop offset="1" stop-color="#0c4b78" stop-opacity=".75"/></linearGradient>
    <pattern id="grid" width="55" height="55" patternUnits="userSpaceOnUse"><path d="M55 0H0V55" fill="none" stroke="#5bdaf1" stroke-opacity=".11" stroke-width="1"/></pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow" x="-30%" y="-30%" width="180%" height="180%"><feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#001022" flood-opacity=".8"/></filter>
  </defs>

  <rect width="2000" height="800" fill="url(#bg)"/>
  <rect width="2000" height="800" fill="url(#aura)"/>
  <rect width="2000" height="800" fill="url(#grid)"/>
  <path d="M0 642C365 554 615 715 1000 590s670-116 1000 0V800H0Z" fill="#04152f" opacity=".83"/>
  <path d="M0 694C364 625 632 750 982 634s666-104 1018-20" fill="none" stroke="#2ad9ef" stroke-opacity=".18" stroke-width="2"/>

  <!-- Abstract measurement rings -->
  <g fill="none" stroke="#42e1f2" opacity=".38">
    <circle cx="1540" cy="278" r="156" stroke-width="1"/>
    <circle cx="1540" cy="278" r="111" stroke-width="1" stroke-dasharray="7 13"/>
    <circle cx="1540" cy="278" r="69" stroke-width="2" stroke-dasharray="2 10"/>
    <path d="M1348 278h384M1540 86v384" stroke-width="1"/>
  </g>
  <g fill="#79f7ff" filter="url(#glow)"><circle cx="1384" cy="278" r="5"/><circle cx="1540" cy="122" r="5"/><circle cx="1644" cy="383" r="4"/></g>
  <g fill="none" stroke="#20c9e7" stroke-width="2" opacity=".45"><path d="M1156 495h179l39-39h101"/><path d="M1415 598h132l28-28h188"/><path d="M1210 144h120l30 30h166"/></g>
  <g fill="#5df5ff" filter="url(#glow)"><circle cx="1335" cy="495" r="4"/><circle cx="1575" cy="570" r="4"/><circle cx="1360" cy="174" r="4"/></g>

  <!-- Electron microscope workstation -->
  <g filter="url(#shadow)" transform="translate(172 50)">
    <!-- desk -->
    <path d="M55 589h645l42 38v75H38V627Z" fill="url(#metal)" stroke="#b6eefa" stroke-opacity=".5" stroke-width="3"/>
    <path d="M38 627h704" stroke="#76f0ff" stroke-opacity=".65" stroke-width="4"/>
    <path d="M92 703v42M281 703v42M579 703v42M699 703v42" stroke="#8bd8e8" stroke-width="16"/>
    <!-- left cabinet -->
    <path d="M65 633h199v75H65Z" fill="#8aa5b5" opacity=".9"/><path d="M264 633h197v75H264Z" fill="#7090a4"/>
    <path d="M461 633h236v75H461Z" fill="#8aa5b5"/>
    <g fill="#18dff4"><circle cx="245" cy="670" r="5"/><circle cx="442" cy="670" r="5"/><circle cx="678" cy="670" r="5"/></g>
    <!-- central microscope column -->
    <path d="M267 136c0-38 30-68 68-68s68 30 68 68v83h-136Z" fill="url(#metal)" stroke="#d3fbff" stroke-width="3"/>
    <path d="M278 201h114v254H278Z" fill="url(#metal)" stroke="#d3fbff" stroke-width="3"/>
    <path d="M290 226h90v36h-90Z" fill="#4a7189"/><path d="M299 235h72v17h-72Z" fill="#072a4a"/>
    <path d="M301 455h69v107h-69Z" fill="#b6d8e4"/>
    <path d="M318 456h35v84h-35Z" fill="#476d84"/>
    <!-- top optic and arm -->
    <path d="M304 68h61v-50h-61Z" fill="url(#metal)" stroke="#d3fbff" stroke-width="3"/>
    <path d="M314 18h41v-30h-41Z" fill="#c1e8f0"/>
    <path d="M392 154c100 1 122 58 122 120v102h-42V272c0-43-22-75-80-76Z" fill="url(#metal)" stroke="#d3fbff" stroke-width="3"/>
    <path d="M475 224h64v166h-64Z" fill="url(#metal)" stroke="#d3fbff" stroke-width="3"/>
    <path d="M484 239h46v100h-46Z" fill="#587b8f"/>
    <!-- specimen chamber -->
    <ellipse cx="332" cy="501" rx="82" ry="39" fill="#bedde7" stroke="#dcfdff" stroke-width="4"/>
    <ellipse cx="332" cy="495" rx="55" ry="24" fill="#0c3857" stroke="#42e9fa" stroke-width="3"/>
    <circle cx="332" cy="495" r="13" fill="#61f4ff" filter="url(#glow)"/>
    <!-- controls -->
    <g fill="#c6e6ed" stroke="#dffeff" stroke-width="2"><circle cx="250" cy="316" r="24"/><circle cx="414" cy="333" r="22"/><circle cx="256" cy="380" r="15"/></g>
    <g fill="#19dff4"><circle cx="250" cy="316" r="7"/><circle cx="414" cy="333" r="6"/><circle cx="256" cy="380" r="4"/></g>
    <!-- monitor -->
    <path d="M545 384h167v111H545Z" fill="#a9cad6" stroke="#d6faff" stroke-width="4"/>
    <path d="M557 396h143v81H557Z" fill="#052745"/>
    <path d="M566 456c17-43 39-6 55-38 17-34 36 36 55-17 10-28 18-10 18-10" fill="none" stroke="#58f5ff" stroke-width="3" filter="url(#glow)"/>
    <path d="M607 495h42v48h-42Z" fill="url(#metal)"/><path d="M578 542h102" stroke="#a8d5df" stroke-width="10"/>
    <!-- light traces -->
    <g fill="none" stroke="#58f5ff" stroke-linecap="round" filter="url(#glow)"><path d="M332 58v-36" stroke-width="3"/><path d="M332 501H191" stroke-width="3"/><path d="M539 288h46" stroke-width="2"/></g>
  </g>

  <!-- Right-side abstract scan panel, intentionally text-free -->
  <g transform="translate(1710 488)" fill="none" stroke="#7aeefa" opacity=".5"><rect width="154" height="104" rx="8"/><path d="M20 74l24-25 24 15 28-42 40 26M20 25h44M20 34h71"/><circle cx="121" cy="29" r="12"/></g>
  <path d="M1040 723h705" stroke="#36d9eb" stroke-opacity=".32" stroke-width="2" stroke-dasharray="7 12"/>

  <!-- Brand and scannable QR block -->
  <g transform="translate(1245 604)">
    <rect x="0" y="0" width="593" height="132" rx="14" fill="#061a35" fill-opacity=".82" stroke="#4ce9f4" stroke-opacity=".42" stroke-width="2"/>
    <path d="M28 34h44M28 34v44M400 98h-42M400 98V56" fill="none" stroke="#4ce9f4" stroke-width="3" opacity=".7"/>
    <text x="95" y="59" fill="#e9feff" font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif" font-size="38" font-weight="700" letter-spacing="4">精研汇智</text>
    <text x="98" y="91" fill="#76ddea" font-family="Arial, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" letter-spacing="2">PRECISION RESEARCH · INTELLIGENT INSIGHT</text>
    <rect x="435" y="-20" width="154" height="154" rx="9" fill="#fff" stroke="#76f4ff" stroke-width="3"/>
    <image href="jingyan-huizhi-qr-code.png" x="442" y="-13" width="140" height="140" preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>
